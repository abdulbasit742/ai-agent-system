name: audit-trust-receiver-consistency-package
on:
  push:
    branches: [main]
  pull_request:
permissions:
  contents: read
jobs:
  receiver-consistency-package-smoke:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Build and validate dependency-free wheel
        run: |
          python -m pip wheel . --no-deps --wheel-dir dist
          python scripts/validate_wheel.py dist/*.whl
      - name: Install and exercise both receiver consistency aliases outside source checkout
        run: |
          set -euo pipefail
          python -m venv "$RUNNER_TEMP/receiver-consistency-venv"
          BIN="$RUNNER_TEMP/receiver-consistency-venv/bin"
          "$BIN/python" -m pip install --no-deps dist/*.whl
          ROOT="$RUNNER_TEMP/installed-audit-trust-receiver-consistency"
          mkdir -p "$ROOT/run"
          cd "$ROOT/run"
          ROOT="$ROOT" "$BIN/python" - <<'PY'
          import json
          import os
          from pathlib import Path
          from agent_audit_trust_receiver import append_transition, canonical_json, create_state
          from agent_audit_trust_receiver_checkpoint import create_checkpoint

          root = Path(os.environ["ROOT"])
          def h(value): return f"{value:064x}"
          def snapshot(seed=1):
              return {
                  "valid": True,
                  "bundle_id": h(1000 + seed),
                  "bundle_type": "snapshot",
                  "candidate": {
                      "checkpoint_id": h(2000 + seed),
                      "state_id": h(3000 + seed),
                      "entry_count": 1,
                      "merkle_root": h(4000 + seed),
                      "head": {
                          "entry_hash": h(5000 + seed),
                          "bundle_id": h(6000 + seed),
                          "checkpoint_id": h(7000 + seed),
                          "catalog_id": h(8000 + seed),
                          "generation": 1,
                          "segment_count": 1,
                      },
                  },
                  "previous": None,
                  "head_bundle_id": h(6000 + seed),
              }
          def transition(state, seed):
              head = state["head"]
              return {
                  "valid": True,
                  "bundle_id": h(1000 + seed),
                  "bundle_type": "transition",
                  "candidate": {
                      "checkpoint_id": h(2000 + seed),
                      "state_id": h(3000 + seed),
                      "entry_count": head["entry_count"] + 2,
                      "merkle_root": h(4000 + seed),
                      "head": {
                          "entry_hash": h(5000 + seed),
                          "bundle_id": h(6000 + seed),
                          "checkpoint_id": h(7000 + seed),
                          "catalog_id": h(8000 + seed),
                          "generation": head["generation"] + 1,
                          "segment_count": head["segment_count"] + 1,
                      },
                  },
                  "previous": {
                      "checkpoint_id": head["checkpoint_id"],
                      "state_id": head["state_id"],
                      "entry_count": head["entry_count"],
                  },
                  "head_bundle_id": h(6000 + seed),
              }
          def admission(verified, seed):
              candidate = verified["candidate"]
              previous = verified.get("previous")
              head = candidate["head"]
              return {
                  "admitted": True,
                  "policy_sha256": h(10000 + seed),
                  "decision_id": h(11000 + seed),
                  "identity": {
                      "bundle_id": verified["bundle_id"],
                      "bundle_type": verified["bundle_type"],
                      "candidate_checkpoint_id": candidate["checkpoint_id"],
                      "candidate_state_id": candidate["state_id"],
                      "previous_checkpoint_id": previous["checkpoint_id"] if previous else None,
                      "previous_state_id": previous["state_id"] if previous else None,
                  },
                  "evidence": {
                      "candidate_entry_count": candidate["entry_count"],
                      "candidate_generation": head["generation"],
                      "candidate_segment_count": head["segment_count"],
                      "head_bundle_id": verified["head_bundle_id"],
                      "entry_delta": candidate["entry_count"] - previous["entry_count"] if previous else None,
                      "generation_delta": 1 if previous else None,
                  },
                  "violations": [],
              }
          first = snapshot()
          retained = create_state(admission(first, 1), first)
          second = transition(retained, 2)
          candidate = append_transition(retained, admission(second, 2), second)
          for name, payload in {
              "retained-state.json": retained,
              "candidate-state.json": candidate,
              "retained-checkpoint.json": create_checkpoint(retained),
              "candidate-checkpoint.json": create_checkpoint(candidate),
          }.items():
              (root / name).write_bytes(canonical_json(payload))
          (root / "pins.json").write_text(json.dumps({
              "retained_state": retained["state_id"],
              "candidate_state": candidate["state_id"],
              "retained_checkpoint": create_checkpoint(retained)["checkpoint_id"],
              "candidate_checkpoint": create_checkpoint(candidate)["checkpoint_id"],
          }, sort_keys=True))
          PY
          pin() { "$BIN/python" -c 'import json,sys; print(json.load(open(sys.argv[1]))[sys.argv[2]])' "$ROOT/pins.json" "$1"; }
          RETAINED_STATE=$(pin retained_state)
          CANDIDATE_STATE=$(pin candidate_state)
          RETAINED_CHECKPOINT=$(pin retained_checkpoint)
          CANDIDATE_CHECKPOINT=$(pin candidate_checkpoint)
          "$BIN/basit-agent-audit-trust-receiver-consistency" prove \
            "$ROOT/retained-state.json" "$ROOT/retained-checkpoint.json" \
            "$ROOT/candidate-state.json" "$ROOT/candidate-checkpoint.json" \
            "$ROOT/consistency.json" \
            --expected-previous-state-id "$RETAINED_STATE" \
            --expected-previous-checkpoint-id "$RETAINED_CHECKPOINT" \
            --expected-candidate-state-id "$CANDIDATE_STATE" \
            --expected-candidate-checkpoint-id "$CANDIDATE_CHECKPOINT" \
            --format json > "$ROOT/prove.json"
          rm "$ROOT/retained-state.json" "$ROOT/candidate-state.json"
          "$BIN/agent-audit-trust-receiver-consistency" verify \
            "$ROOT/consistency.json" "$ROOT/retained-checkpoint.json" \
            "$ROOT/candidate-checkpoint.json" \
            --expected-previous-checkpoint-id "$RETAINED_CHECKPOINT" \
            --expected-candidate-checkpoint-id "$CANDIDATE_CHECKPOINT" \
            --format json > "$ROOT/verify.json"
          "$BIN/python" -c 'import json,sys; d=json.load(open(sys.argv[1])); assert d["valid"] and d["relation"]=="right-descendant"' "$ROOT/verify.json"
      - name: Preserve installed receiver consistency evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: audit-trust-receiver-consistency-package-${{ matrix.python-version }}-${{ github.sha }}
          path: ${{ runner.temp }}/installed-audit-trust-receiver-consistency/
          if-no-files-found: warn
