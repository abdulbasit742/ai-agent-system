name: audit-trust-receiver-admission
on:
  push:
    branches: [main]
  pull_request:
permissions:
  contents: read
jobs:
  receiver-admission-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Test receiver bundle admission
        run: python -m unittest discover -s tests -p "test_audit_trust_receiver_admission.py" -v
      - name: Re-run receiver bundle and consistency regressions
        run: |
          python -m unittest discover -s tests -p "test_audit_trust_receiver_bundle.py" -v
          python -m unittest discover -s tests -p "test_audit_trust_receiver_consistency.py" -v
      - name: Compile runtime
        run: python -m compileall -q agent_audit_trust_receiver_admission.py tests/test_audit_trust_receiver_admission.py

  receiver-admission-integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Evaluate real snapshot and transition receiver bundles
        run: |
          set -euo pipefail
          ROOT="$RUNNER_TEMP/audit-trust-receiver-admission"
          mkdir -p "$ROOT"
          ROOT="$ROOT" python - <<'PY'
          import json
          import os
          import sys
          from pathlib import Path
          sys.path.insert(0, "tests")
          from agent_audit_trust_receiver_admission import canonical_json, default_policy
          from test_audit_trust_receiver_bundle import create_from_inputs, make_inputs
          from test_audit_trust_receiver_consistency import receiver_state

          root = Path(os.environ["ROOT"])
          snapshot_inputs = make_inputs(root / "snapshot", receiver_state(1))
          snapshot_manifest = create_from_inputs(root / "snapshot", snapshot_inputs)
          transition_inputs = make_inputs(
              root / "transition", receiver_state(3), receiver_state(1), sequences=[1, 3]
          )
          transition_manifest = create_from_inputs(root / "transition", transition_inputs)
          (root / "policy.json").write_bytes(canonical_json(default_policy()))
          (root / "pins.json").write_text(json.dumps({
              "snapshot_bundle": snapshot_manifest["bundle_id"],
              "snapshot_checkpoint": snapshot_inputs["candidate"]["checkpoint_id"],
              "transition_bundle": transition_manifest["bundle_id"],
              "transition_checkpoint": transition_inputs["candidate"]["checkpoint_id"],
              "previous_checkpoint": transition_inputs["previous"]["checkpoint_id"],
          }, sort_keys=True))
          PY
          pin() { python -c 'import json,sys; print(json.load(open(sys.argv[1]))[sys.argv[2]])' "$ROOT/pins.json" "$1"; }
          SNAPSHOT_BUNDLE=$(pin snapshot_bundle)
          SNAPSHOT_CHECKPOINT=$(pin snapshot_checkpoint)
          TRANSITION_BUNDLE=$(pin transition_bundle)
          TRANSITION_CHECKPOINT=$(pin transition_checkpoint)
          PREVIOUS_CHECKPOINT=$(pin previous_checkpoint)
          python agent_audit_trust_receiver_admission.py evaluate "$ROOT/snapshot/bundle" \
            --policy "$ROOT/policy.json" \
            --expected-bundle-id "$SNAPSHOT_BUNDLE" \
            --expected-candidate-checkpoint-id "$SNAPSHOT_CHECKPOINT" \
            --format json > "$ROOT/snapshot-admission.json"
          python agent_audit_trust_receiver_admission.py evaluate "$ROOT/transition/bundle" \
            --policy "$ROOT/policy.json" \
            --expected-bundle-id "$TRANSITION_BUNDLE" \
            --expected-candidate-checkpoint-id "$TRANSITION_CHECKPOINT" \
            --expected-previous-checkpoint-id "$PREVIOUS_CHECKPOINT" \
            --format json > "$ROOT/transition-admission.json"
          python - <<'PY' "$ROOT/snapshot-admission.json" "$ROOT/transition-admission.json"
          import json, sys
          snapshot = json.load(open(sys.argv[1]))
          transition = json.load(open(sys.argv[2]))
          assert snapshot["admitted"] and transition["admitted"]
          assert transition["evidence"]["receiver_entry_delta"] == 2
          assert transition["evidence"]["trust_entry_delta"] == 4
          assert transition["evidence"]["generation_delta"] == 2
          PY
          python - <<'PY' "$ROOT/policy.json"
          import json, sys
          path = sys.argv[1]
          policy = json.load(open(path))
          policy["bundle"]["allowed_types"] = ["snapshot"]
          open(path, "w").write(json.dumps(policy, sort_keys=True, indent=2) + "\n")
          PY
          set +e
          python agent_audit_trust_receiver_admission.py evaluate "$ROOT/transition/bundle" \
            --policy "$ROOT/policy.json" \
            --expected-bundle-id "$TRANSITION_BUNDLE" \
            --expected-candidate-checkpoint-id "$TRANSITION_CHECKPOINT" \
            --expected-previous-checkpoint-id "$PREVIOUS_CHECKPOINT" \
            --format json > "$ROOT/denied.json"
          DENIED=$?
          python agent_audit_trust_receiver_admission.py evaluate "$ROOT/transition/bundle" \
            --policy "$ROOT/policy.json" \
            --expected-bundle-id "$(printf 'f%.0s' {1..64})" \
            --expected-candidate-checkpoint-id "$TRANSITION_CHECKPOINT" \
            --expected-previous-checkpoint-id "$PREVIOUS_CHECKPOINT" \
            --format json > "$ROOT/invalid.json" 2> "$ROOT/invalid-error.json"
          INVALID=$?
          set -e
          test "$DENIED" -eq 1
          test "$INVALID" -eq 2
      - name: Preserve receiver admission evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: audit-trust-receiver-admission-${{ github.sha }}
          path: ${{ runner.temp }}/audit-trust-receiver-admission/
          if-no-files-found: warn
