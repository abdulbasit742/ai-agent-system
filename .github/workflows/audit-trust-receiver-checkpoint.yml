name: audit-trust-receiver-checkpoint
on:
  push:
    branches: [main]
  pull_request:
permissions:
  contents: read
jobs:
  receiver-checkpoint-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Test receiver checkpoints and proofs
        run: python -m unittest discover -s tests -p "test_audit_trust_receiver_checkpoint.py" -v
      - name: Re-run receiver and handoff regressions
        run: |
          python -m unittest discover -s tests -p "test_audit_trust_receiver.py" -v
          python -m unittest discover -s tests -p "test_audit_trust_receiver_cli.py" -v
          python -m unittest discover -s tests -p "test_audit_trust_bundle.py" -v
      - name: Compile runtime
        run: python -m compileall -q agent_audit_trust_receiver_checkpoint.py tests/test_audit_trust_receiver_checkpoint.py

  receiver-checkpoint-integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Create checkpoint, prove head, verify offline, and gate lineage
        run: |
          set -euo pipefail
          ROOT="$RUNNER_TEMP/audit-trust-receiver-checkpoint"
          mkdir -p "$ROOT"
          ROOT="$ROOT" python - <<'PY'
          import json
          import os
          import sys
          from pathlib import Path
          sys.path.insert(0, "tests")
          from agent_audit_trust_receiver import canonical_json
          from audit_trust_receiver_cases import admitted
          from test_audit_trust_consistency import advance, anchor
          from agent_audit_trust_receiver import append_transition, create_state

          root = Path(os.environ["ROOT"])
          trust1 = anchor()
          trust2 = advance(trust1, 2)
          snapshot = admitted(root / "snapshot-input", trust1, name="snapshot")
          transition = admitted(root / "transition-input", trust2, trust1, name="transition")
          state1 = create_state(snapshot[0], snapshot[1])
          state2 = append_transition(state1, transition[0], transition[1])
          (root / "state1.json").write_bytes(canonical_json(state1))
          (root / "state2.json").write_bytes(canonical_json(state2))
          (root / "pins.json").write_text(json.dumps({
              "state1": state1["state_id"],
              "state2": state2["state_id"],
              "handoff": str(transition[4]),
              "handoff_id": state2["head"]["handoff_bundle_id"],
          }, sort_keys=True))
          PY
          pin() { python -c 'import json,sys; print(json.load(open(sys.argv[1]))[sys.argv[2]])' "$ROOT/pins.json" "$1"; }
          STATE1=$(pin state1)
          STATE2=$(pin state2)
          HANDOFF=$(pin handoff)
          HANDOFF_ID=$(pin handoff_id)
          python agent_audit_trust_receiver_checkpoint.py create \
            "$ROOT/state2.json" "$ROOT/checkpoint.json" \
            --expected-state-id "$STATE2" --format json > "$ROOT/create.json"
          CHECKPOINT=$(python -c 'import json,sys; print(json.load(open(sys.argv[1]))["checkpoint_id"])' "$ROOT/create.json")
          python agent_audit_trust_receiver_checkpoint.py prove \
            "$ROOT/state2.json" "$ROOT/checkpoint.json" "$ROOT/proof.json" \
            --expected-state-id "$STATE2" \
            --expected-checkpoint-id "$CHECKPOINT" \
            --handoff-bundle-id "$HANDOFF_ID" --format json > "$ROOT/prove.json"
          python agent_audit_trust_receiver_checkpoint.py lineage \
            "$ROOT/state1.json" "$ROOT/state2.json" \
            --expected-left-state-id "$STATE1" \
            --expected-right-state-id "$STATE2" --format json > "$ROOT/descendant.json"
          set +e
          python agent_audit_trust_receiver_checkpoint.py lineage \
            "$ROOT/state2.json" "$ROOT/state1.json" \
            --expected-left-state-id "$STATE2" \
            --expected-right-state-id "$STATE1" --format json > "$ROOT/rollback.json"
          ROLLBACK=$?
          python agent_audit_trust_receiver_checkpoint.py verify "$ROOT/checkpoint.json" \
            --expected-checkpoint-id "$(printf 'f%.0s' {1..64})" \
            --format json > "$ROOT/stale.json" 2> "$ROOT/stale-error.json"
          STALE=$?
          set -e
          test "$ROLLBACK" -eq 1
          test "$STALE" -eq 2
          rm "$ROOT/state2.json"
          python agent_audit_trust_receiver_checkpoint.py verify-proof \
            "$ROOT/proof.json" "$ROOT/checkpoint.json" \
            --expected-checkpoint-id "$CHECKPOINT" \
            --handoff "$HANDOFF" --format json > "$ROOT/verify-proof.json"
          python -c 'import json,sys; d=json.load(open(sys.argv[1])); assert d["valid"] and d["handoff_verified"] and d["entry"]["sequence"]==2' "$ROOT/verify-proof.json"
      - name: Preserve receiver checkpoint evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: audit-trust-receiver-checkpoint-${{ github.sha }}
          path: ${{ runner.temp }}/audit-trust-receiver-checkpoint/
          if-no-files-found: warn
