name: audit-trust-receiver-acceptance-package
on:
  push:
    branches: [main]
  pull_request:
permissions:
  contents: read
jobs:
  receiver-acceptance-package-smoke:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Build and validate dependency-free wheel
        run: |
          python -m pip wheel . --no-deps --wheel-dir dist
          python scripts/validate_wheel.py dist/*.whl
      - name: Install and exercise both acceptance aliases outside source checkout
        run: |
          set -euo pipefail
          python -m venv "$RUNNER_TEMP/acceptance-venv"
          BIN="$RUNNER_TEMP/acceptance-venv/bin"
          "$BIN/python" -m pip install --no-deps dist/*.whl
          ROOT="$RUNNER_TEMP/installed-receiver-acceptance"
          mkdir -p "$ROOT/run"
          cd "$ROOT/run"
          ROOT="$ROOT" "$BIN/python" - <<'PY'
          import json
          import os
          from pathlib import Path
          from agent_audit_trust_receiver_acceptance import canonical_json, create_state

          root = Path(os.environ["ROOT"])
          def h(value): return f"{value:064x}"
          candidate = {
              "checkpoint_id": h(101), "state_id": h(102), "entry_count": 1,
              "merkle_root": h(103),
              "head": {
                  "sequence": 1, "entry_hash": h(104), "handoff_bundle_id": h(105),
                  "checkpoint_id": h(106), "state_id": h(107), "entry_count": 1,
                  "head_bundle_id": h(108), "generation": 1, "segment_count": 1,
              },
          }
          verified = {
              "valid": True, "bundle_id": h(100), "bundle_type": "snapshot",
              "candidate": candidate, "previous": None, "consistency": None,
              "files": 4, "bytes": 1000, "proof_count": 1,
              "head_handoff_bundle_id": candidate["head"]["handoff_bundle_id"],
          }
          report = {
              "admitted": True, "policy_sha256": h(201), "decision_id": h(202),
              "identity": {
                  "bundle_id": verified["bundle_id"], "bundle_type": "snapshot",
                  "candidate_receiver_checkpoint_id": candidate["checkpoint_id"],
                  "candidate_receiver_state_id": candidate["state_id"],
                  "previous_receiver_checkpoint_id": None,
                  "previous_receiver_state_id": None,
              },
              "evidence": {
                  "files": 4, "bytes": 1000, "proof_count": 1,
                  "selected_sequences": [1],
                  "selected_handoff_ids": [candidate["head"]["handoff_bundle_id"]],
                  "candidate_receiver_entries": 1, "candidate_trust_entries": 1,
                  "candidate_generation": 1, "candidate_segment_count": 1,
                  "head_handoff_bundle_id": candidate["head"]["handoff_bundle_id"],
                  "receiver_entry_delta": None, "trust_entry_delta": None,
                  "generation_delta": None,
              },
              "violations": [],
          }
          state = create_state(report, verified)
          (root / "acceptance.json").write_bytes(canonical_json(state))
          (root / "pin.txt").write_text(state["state_id"])
          PY
          STATE=$(cat "$ROOT/pin.txt")
          "$BIN/basit-agent-audit-trust-receiver-acceptance" verify \
            "$ROOT/acceptance.json" --expected-state-id "$STATE" --format json > "$ROOT/basit.json"
          "$BIN/agent-audit-trust-receiver-acceptance" verify \
            "$ROOT/acceptance.json" --expected-state-id "$STATE" --format json > "$ROOT/agent.json"
          set +e
          "$BIN/agent-audit-trust-receiver-acceptance" verify \
            "$ROOT/acceptance.json" --expected-state-id "$(printf 'f%.0s' {1..64})" \
            --format json > "$ROOT/stale.json" 2> "$ROOT/stale-error.json"
          STALE=$?
          set -e
          test "$STALE" -eq 1
          "$BIN/python" -c 'import json,sys; assert json.load(open(sys.argv[1]))["valid"]' "$ROOT/basit.json"
          "$BIN/python" -c 'import json,sys; assert json.load(open(sys.argv[1]))["valid"]' "$ROOT/agent.json"
      - name: Preserve installed acceptance evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: audit-trust-receiver-acceptance-package-${{ matrix.python-version }}-${{ github.sha }}
          path: ${{ runner.temp }}/installed-receiver-acceptance/
          if-no-files-found: warn
