name: ci
on:
  push:
    branches: [main]
  pull_request:
permissions:
  contents: read
jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m unittest discover -s tests -v
      - run: python -m compileall -q agent_system.py agent_policy.py agent_config.py agent_baseline.py tests scripts
      - run: python agent_system.py config .agent-system.example.json
      - run: python agent_system.py policy .agent-system-policy.example.json
      - run: python agent_system.py --audit-log /tmp/agent-audit.jsonl baseline /tmp/agent-baseline.json --create --scan-path .
      - run: python agent_system.py --audit-log /tmp/agent-audit.jsonl scan . --new-only --baseline /tmp/agent-baseline.json --format json --fail-on high
      - run: python agent_system.py scan . --format json --fail-on high
      - run: python agent_system.py guard python -m unittest discover -s tests
