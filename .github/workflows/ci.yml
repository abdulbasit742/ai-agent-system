name: ci
on:
  push:
    branches: [main]
  pull_request:
permissions:
  contents: read
jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Test scanner and CLI
        run: python -m unittest discover -s tests -p "test_agent_system.py" -v
      - name: Test strict audit logs
        run: python -m unittest discover -s tests -p "test_agent_audit.py" -v
      - name: Test typed audit event admission
        run: python -m unittest discover -s tests -p "test_audit_event_admission.py" -v
      - name: Test audit segment rotation
        run: python -m unittest discover -s tests -p "test_audit_segments.py" -v
      - name: Test audit segment catalog
        run: python -m unittest discover -s tests -p "test_audit_catalog.py" -v
      - name: Test suppression policies
        run: python -m unittest discover -s tests -p "test_agent_policy.py" -v
      - name: Test rule-pack configuration
        run: python -m unittest discover -s tests -p "test_agent_config.py" -v
      - name: Test baseline model
        run: python -m unittest discover -s tests -p "test_agent_baseline.py" -v
      - name: Test baseline CLI existing finding
        run: python -m unittest discover -s tests -p "test_baseline_cli.py" -k existing_high -v
      - name: Test baseline CLI new regression
        run: python -m unittest discover -s tests -p "test_baseline_cli.py" -k new_high -v
      - name: Test baseline CLI scope mismatch
        run: python -m unittest discover -s tests -p "test_baseline_cli.py" -k changed_rule_scope -v
      - name: Test baseline CLI overwrite protection
        run: python -m unittest discover -s tests -p "test_baseline_cli.py" -k refuses_overwrite -v
      - name: Test Git change-scope model
        run: python -m unittest discover -s tests -p "test_agent_git.py" -v
      - name: Test changed-file scanner CLI
        run: python -m unittest discover -s tests -p "test_changed_scan_cli.py" -v
      - name: Test Git added-line scope model
        run: python -m unittest discover -s tests -p "test_agent_git_lines.py" -v
      - name: Test added-line security gate
        run: python -m unittest discover -s tests -p "test_added_line_gate.py" -v
      - name: Test GitHub Action runner
        run: python -m unittest discover -s tests -p "test_github_action.py" -v
      - name: Test GitHub Action output boundary
        run: python -m unittest discover -s tests -p "test_action_entrypoint.py" -v
      - name: Test Python package metadata and CLI
        run: python -m unittest discover -s tests -p "test_packaging.py" -v
      - name: Test wheel archive validator
        run: python -m unittest discover -s tests -p "test_wheel_validator.py" -v
      - name: Test reproducible release bundles
        run: python -m unittest discover -s tests -p "test_release_bundle.py" -v
      - name: Test SBOM and provenance evidence
        run: python -m unittest discover -s tests -p "test_supply_chain_evidence.py" -v
      - name: Test consumer release admission
        run: python -m unittest discover -s tests -p "test_release_admission.py" -v
      - name: Test verified release transitions
        run: python -m unittest discover -s tests -p "test_release_transition.py" -v
      - name: Test pinned release trust state
        run: python -m unittest discover -s tests -p "test_release_trust.py" -v
      - run: python -m compileall -q agent_audit.py agent_audit_events.py agent_audit_segments.py agent_audit_catalog.py agent_system.py agent_system_legacy.py agent_policy.py agent_config.py agent_baseline.py agent_git.py agent_changed_lines.py agent_cli.py agent_version.py tests scripts
      - run: python agent_system.py config .agent-system.example.json
      - run: python agent_system.py policy .agent-system-policy.example.json
      - run: python agent_system.py audit-events --format json
      - run: python agent_system.py --audit-log /tmp/agent-audit.jsonl baseline /tmp/agent-baseline.json --create --scan-path .
      - run: python agent_system.py --audit-log /tmp/agent-audit.jsonl scan . --new-only --baseline /tmp/agent-baseline.json --format json --fail-on high
      - run: python agent_system.py audit --path /tmp/agent-audit.jsonl --require-typed --format json
      - run: python agent_changed_lines.py . --changed-from HEAD --format json --audit-log /tmp/agent-line-audit.jsonl
      - run: python agent_system.py audit --path /tmp/agent-line-audit.jsonl --require-typed --format json
      - run: python agent_system.py scan . --format json --fail-on high
      - run: python agent_system.py guard python -m unittest discover -s tests

  action-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Run local composite action
        id: basit
        uses: ./
        with:
          mode: full
          annotations: false
          report-path: .agent-system/action-smoke.json
          sarif-path: .agent-system/action-smoke.sarif
      - name: Validate action outputs and reports
        env:
          FINDING_COUNT: ${{ steps.basit.outputs['finding-count'] }}
          ACTION_STATUS: ${{ steps.basit.outputs.status }}
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          report = json.loads(Path('.agent-system/action-smoke.json').read_text())
          sarif = json.loads(Path('.agent-system/action-smoke.sarif').read_text())
          assert os.environ['ACTION_STATUS'] == 'passed'
          assert int(os.environ['FINDING_COUNT']) == len(report['findings']) == 0
          assert sarif['version'] == '2.1.0'
          assert sarif['runs'][0]['results'] == []
          PY

  package-smoke:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Build dependency-free wheel
        run: python -m pip wheel . --no-deps --wheel-dir dist
      - name: Validate wheel contents
        run: python scripts/validate_wheel.py dist/*.whl
      - name: Install wheel in isolated environment
        run: |
          python -m venv "$RUNNER_TEMP/basit-agent-venv"
          "$RUNNER_TEMP/basit-agent-venv/bin/python" -m pip install --no-deps dist/*.whl
      - name: Validate installed console commands
        env:
          EXPECTED_VERSION: "0.1.0"
        run: |
          BIN="$RUNNER_TEMP/basit-agent-venv/bin"
          EXPECTED="basit-agent-system $EXPECTED_VERSION"
          test "$("$BIN/basit-agent" --version)" = "$EXPECTED"
          test "$("$BIN/basit-agent-lines" --version)" = "$EXPECTED"
          test "$("$BIN/agent-system" --version)" = "$EXPECTED"
          test "$("$BIN/agent-changed-lines" --version)" = "$EXPECTED"
          "$BIN/basit-agent-segments" --help >/dev/null
          "$BIN/agent-audit-segments" --help >/dev/null
          "$BIN/basit-agent-catalog" --help >/dev/null
          "$BIN/agent-audit-catalog" --help >/dev/null

          mkdir -p "$RUNNER_TEMP/package-run"
          cd "$RUNNER_TEMP/package-run"
          "$BIN/basit-agent" \
            --audit-log "$RUNNER_TEMP/package-audit.jsonl" \
            scan "$GITHUB_WORKSPACE" \
            --format json \
            --fail-on high \
            --output "$RUNNER_TEMP/package-scan.json"
          "$BIN/basit-agent" audit \
            --path "$RUNNER_TEMP/package-audit.jsonl" \
            --require-typed \
            --format json \
            > "$RUNNER_TEMP/package-audit-report.json"

          "$BIN/python" - <<'PY'
          import json
          import os
          from pathlib import Path

          root = Path(os.environ['RUNNER_TEMP'])
          report = json.loads((root / 'package-scan.json').read_text())
          audit = json.loads((root / 'package-audit-report.json').read_text())
          assert report['findings'] == []
          assert report['summary']['active'] == 0
          assert audit['valid'] is True
          assert audit['typed_records'] == audit['records'] == 1
          assert audit['privacy_safe'] is True
          PY

          set +e
          "$BIN/basit-agent" doctor >"$RUNNER_TEMP/package-doctor.txt" 2>&1
          STATUS=$?
          set -e
          test "$STATUS" -eq 2
          grep -q "requires a source checkout" "$RUNNER_TEMP/package-doctor.txt"

  release-readiness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Resolve deterministic source epoch
        id: source
        run: echo "epoch=$(git show -s --format=%ct HEAD)" >> "$GITHUB_OUTPUT"
      - name: Build wheel twice from the same source epoch
        env:
          SOURCE_DATE_EPOCH: ${{ steps.source.outputs.epoch }}
        run: |
          python -m pip wheel . --no-deps --wheel-dir dist-one
          python -m pip wheel . --no-deps --wheel-dir dist-two
      - name: Verify byte-for-byte reproducibility
        run: python scripts/release_bundle.py compare dist-one/*.whl dist-two/*.whl
      - name: Create release evidence bundle
        run: |
          python scripts/release_bundle.py create \
            --wheel dist-one/*.whl \
            --output-dir release \
            --source-commit "$GITHUB_SHA" \
            --source-date-epoch "${{ steps.source.outputs.epoch }}"
      - name: Verify release evidence bundle
        run: python scripts/release_bundle.py verify release
      - name: Validate manifest, SBOM, and provenance identity
        env:
          EXPECTED_COMMIT: ${{ github.sha }}
          EXPECTED_EPOCH: ${{ steps.source.outputs.epoch }}
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          manifest = json.loads(Path('release/release-manifest.json').read_text())
          assert manifest['manifest_version'] == 2
          assert manifest['source']['commit'] == os.environ['EXPECTED_COMMIT'].lower()
          assert manifest['source']['source_date_epoch'] == int(os.environ['EXPECTED_EPOCH'])
          assert len(manifest['release_id']) == 64
          assert len(manifest['artifacts']) == 1

          artifact = manifest['artifacts'][0]
          assert set(artifact['evidence']) == {'sbom', 'provenance'}
          sbom = json.loads(Path('release', artifact['evidence']['sbom']['filename']).read_text())
          provenance = json.loads(Path('release', artifact['evidence']['provenance']['filename']).read_text())
          assert sbom['spdxVersion'] == 'SPDX-2.3'
          assert len(sbom['files']) == artifact['modules']
          assert provenance['_type'] == 'https://in-toto.io/Statement/v1'
          assert provenance['predicateType'] == 'https://slsa.dev/provenance/v1'
          assert provenance['subject'][0]['name'] == artifact['filename']
          assert provenance['subject'][0]['digest']['sha256'] == artifact['sha256']
          PY
      - name: Preserve verified release evidence
        uses: actions/upload-artifact@v4
        with:
          name: basit-agent-system-release-${{ github.sha }}
          path: release/
          if-no-files-found: error
