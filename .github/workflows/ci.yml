name: ci
on:
  push:
    branches: [main]
  pull_request:
permissions:
  contents: read
jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Test scanner and CLI
        run: python -m unittest discover -s tests -p "test_agent_system.py" -v
      - name: Test suppression policies
        run: python -m unittest discover -s tests -p "test_agent_policy.py" -v
      - name: Test rule-pack configuration
        run: python -m unittest discover -s tests -p "test_agent_config.py" -v
      - name: Test baseline model
        run: python -m unittest discover -s tests -p "test_agent_baseline.py" -v
      - name: Test baseline CLI existing finding
        run: python -m unittest discover -s tests -p "test_baseline_cli.py" -k existing_high -v
      - name: Test baseline CLI new regression
        run: python -m unittest discover -s tests -p "test_baseline_cli.py" -k new_high -v
      - name: Test baseline CLI scope mismatch
        run: python -m unittest discover -s tests -p "test_baseline_cli.py" -k changed_rule_scope -v
      - name: Test baseline CLI overwrite protection
        run: python -m unittest discover -s tests -p "test_baseline_cli.py" -k refuses_overwrite -v
      - name: Test Git change-scope model
        run: python -m unittest discover -s tests -p "test_agent_git.py" -v
      - name: Test changed-file scanner CLI
        run: python -m unittest discover -s tests -p "test_changed_scan_cli.py" -v
      - run: python -m compileall -q agent_system.py agent_policy.py agent_config.py agent_baseline.py agent_git.py tests scripts
      - run: python agent_system.py config .agent-system.example.json
      - run: python agent_system.py policy .agent-system-policy.example.json
      - run: python agent_system.py --audit-log /tmp/agent-audit.jsonl baseline /tmp/agent-baseline.json --create --scan-path .
      - run: python agent_system.py --audit-log /tmp/agent-audit.jsonl scan . --new-only --baseline /tmp/agent-baseline.json --format json --fail-on high
      - run: python agent_system.py scan . --format json --fail-on high
      - run: python agent_system.py guard python -m unittest discover -s tests
