name: release-admission
on:
  push:
    branches: [main]
  pull_request:
permissions:
  contents: read
jobs:
  admit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Test release admission policy
        run: python -m unittest discover -s tests -p "test_release_admission.py" -v
      - name: Validate reviewed admission policy
        run: python scripts/release_admission.py validate .release-admission.example.json
      - name: Resolve deterministic source epoch
        id: source
        run: echo "epoch=$(git show -s --format=%ct HEAD)" >> "$GITHUB_OUTPUT"
      - name: Build and verify release bundle
        env:
          SOURCE_DATE_EPOCH: ${{ steps.source.outputs.epoch }}
        run: |
          python -m pip wheel . --no-deps --wheel-dir dist-admission
          python scripts/release_bundle.py create \
            --wheel dist-admission/*.whl \
            --output-dir release-admission \
            --source-commit "$GITHUB_SHA" \
            --source-date-epoch "$SOURCE_DATE_EPOCH"
          python scripts/release_bundle.py verify release-admission
      - name: Apply consumer admission policy
        env:
          EXPECTED_COMMIT: ${{ github.sha }}
        run: |
          RELEASE_ID="$(python - <<'PY'
          import json
          from pathlib import Path
          print(json.loads(Path('release-admission/release-manifest.json').read_text())['release_id'])
          PY
          )"
          python scripts/release_admission.py evaluate release-admission \
            --policy .release-admission.example.json \
            --expected-source-commit "$EXPECTED_COMMIT" \
            --expected-version "0.1.0" \
            --expected-release-id "$RELEASE_ID" \
            --format json > "$RUNNER_TEMP/release-admission-decision.json"
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          report = json.loads(Path(os.environ['RUNNER_TEMP'], 'release-admission-decision.json').read_text())
          assert report['admitted'] is True
          assert report['violations'] == []
          assert report['release']['source_commit'] == os.environ['EXPECTED_COMMIT'].lower()
          assert report['expected']['release_id'] == report['release']['release_id']
          assert len(report['policy']['sha256']) == 64
          PY
      - name: Preserve admission decision
        uses: actions/upload-artifact@v4
        with:
          name: basit-agent-system-admission-${{ github.sha }}
          path: ${{ runner.temp }}/release-admission-decision.json
          if-no-files-found: error
