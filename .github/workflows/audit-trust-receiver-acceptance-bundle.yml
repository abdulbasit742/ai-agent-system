name: audit-trust-receiver-acceptance-bundle
on:
  push:
    branches: [main]
  pull_request:
permissions:
  contents: read
jobs:
  acceptance-bundle-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Test receiver acceptance bundles
        run: python -m unittest discover -s tests -p "test_audit_trust_receiver_acceptance_bundle.py" -v
      - name: Re-run acceptance checkpoint and consistency regressions
        run: |
          python -m unittest discover -s tests -p "test_audit_trust_receiver_acceptance_checkpoint.py" -v
          python -m unittest discover -s tests -p "test_audit_trust_receiver_acceptance_consistency.py" -v
      - name: Compile runtime
        run: python -m compileall -q agent_audit_trust_receiver_acceptance_bundle.py tests/test_audit_trust_receiver_acceptance_bundle.py

  acceptance-bundle-integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Create snapshot and transition bundles and verify offline
        run: |
          set -euo pipefail
          ROOT="$RUNNER_TEMP/audit-trust-receiver-acceptance-bundle"
          mkdir -p "$ROOT"
          ROOT="$ROOT" python - <<'PY'
          import json
          import os
          import sys
          from pathlib import Path
          sys.path.insert(0, "tests")
          from agent_audit_trust_receiver_acceptance import canonical_json
          from agent_audit_trust_receiver_acceptance_checkpoint import create_checkpoint, create_proof
          from agent_audit_trust_receiver_acceptance_consistency import create_consistency_proof
          from test_audit_trust_receiver_acceptance_consistency import acceptance_state

          root = Path(os.environ["ROOT"])
          previous = acceptance_state(1)
          candidate = acceptance_state(3)
          previous_cp = create_checkpoint(previous)
          candidate_cp = create_checkpoint(candidate)
          previous_proof = create_proof(previous, previous_cp, sequence=1)
          candidate_proof = create_proof(candidate, candidate_cp, sequence=3)
          consistency = create_consistency_proof(previous, previous_cp, candidate, candidate_cp)
          for name, payload in {
              "previous-state.json": previous,
              "candidate-state.json": candidate,
              "previous-checkpoint.json": previous_cp,
              "candidate-checkpoint.json": candidate_cp,
              "previous-proof.json": previous_proof,
              "candidate-proof.json": candidate_proof,
              "consistency.json": consistency,
          }.items():
              (root / name).write_bytes(canonical_json(payload))
          (root / "pins.json").write_text(json.dumps({
              "previous_checkpoint": previous_cp["checkpoint_id"],
              "candidate_checkpoint": candidate_cp["checkpoint_id"],
          }, sort_keys=True))
          PY
          pin() { python -c 'import json,sys; print(json.load(open(sys.argv[1]))[sys.argv[2]])' "$ROOT/pins.json" "$1"; }
          PREVIOUS=$(pin previous_checkpoint)
          CANDIDATE=$(pin candidate_checkpoint)
          python agent_audit_trust_receiver_acceptance_bundle.py create "$ROOT/snapshot" \
            --candidate-checkpoint "$ROOT/previous-checkpoint.json" \
            --expected-candidate-checkpoint-id "$PREVIOUS" \
            --proof "$ROOT/previous-proof.json" > "$ROOT/snapshot-create.json"
          SNAPSHOT=$(python -c 'import json,sys; print(json.load(open(sys.argv[1]))["bundle_id"])' "$ROOT/snapshot-create.json")
          python agent_audit_trust_receiver_acceptance_bundle.py create "$ROOT/transition" \
            --candidate-checkpoint "$ROOT/candidate-checkpoint.json" \
            --expected-candidate-checkpoint-id "$CANDIDATE" \
            --proof "$ROOT/candidate-proof.json" \
            --previous-checkpoint "$ROOT/previous-checkpoint.json" \
            --expected-previous-checkpoint-id "$PREVIOUS" \
            --consistency-proof "$ROOT/consistency.json" > "$ROOT/transition-create.json"
          TRANSITION=$(python -c 'import json,sys; print(json.load(open(sys.argv[1]))["bundle_id"])' "$ROOT/transition-create.json")
          rm "$ROOT"/*-state.json "$ROOT"/*-checkpoint.json "$ROOT"/*-proof.json "$ROOT/consistency.json"
          python agent_audit_trust_receiver_acceptance_bundle.py verify "$ROOT/snapshot" \
            --expected-bundle-id "$SNAPSHOT" \
            --expected-candidate-checkpoint-id "$PREVIOUS" > "$ROOT/snapshot-verify.json"
          python agent_audit_trust_receiver_acceptance_bundle.py verify "$ROOT/transition" \
            --expected-bundle-id "$TRANSITION" \
            --expected-candidate-checkpoint-id "$CANDIDATE" \
            --expected-previous-checkpoint-id "$PREVIOUS" > "$ROOT/transition-verify.json"
          printf 'tamper' > "$ROOT/transition/extra.txt"
          set +e
          python agent_audit_trust_receiver_acceptance_bundle.py verify "$ROOT/transition" \
            --expected-bundle-id "$TRANSITION" \
            --expected-candidate-checkpoint-id "$CANDIDATE" \
            --expected-previous-checkpoint-id "$PREVIOUS" > "$ROOT/extra.json" 2> "$ROOT/extra-error.json"
          EXTRA=$?
          set -e
          test "$EXTRA" -eq 2
      - name: Preserve acceptance bundle evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: audit-trust-receiver-acceptance-bundle-${{ github.sha }}
          path: ${{ runner.temp }}/audit-trust-receiver-acceptance-bundle/
          if-no-files-found: warn
