name: audit-trust-consistency
on:
  push:
    branches: [main]
  pull_request:
permissions:
  contents: read
jobs:
  consistency-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Test audit trust consistency proofs
        run: |
          set +e
          python -m unittest discover -s tests -p "test_audit_trust_consistency.py" -v \
            > "$RUNNER_TEMP/audit-trust-consistency-tests.log" 2>&1
          STATUS=$?
          set -e
          if [ "$STATUS" -ne 0 ]; then
            tail -n 300 "$RUNNER_TEMP/audit-trust-consistency-tests.log"
            exit "$STATUS"
          fi
          cat "$RUNNER_TEMP/audit-trust-consistency-tests.log"
      - name: Re-run checkpoint and trust regressions
        run: |
          python -m unittest discover -s tests -p "test_audit_trust_checkpoint.py" -v
          python -m unittest discover -s tests -p "test_audit_bundle_trust.py" -v
      - name: Compile consistency runtime
        run: python -m compileall -q agent_audit_trust_consistency.py agent_audit_trust_checkpoint.py agent_audit_trust.py tests/test_audit_trust_consistency.py
      - name: Preserve consistency diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: audit-trust-consistency-tests-${{ matrix.python-version }}-${{ github.sha }}
          path: ${{ runner.temp }}/audit-trust-consistency-tests.log
          if-no-files-found: warn

  consistency-integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Create proof-only consistency evidence and gate rollback/fork
        run: |
          set -euo pipefail
          ROOT="$RUNNER_TEMP/audit-trust-consistency"
          mkdir -p "$ROOT"
          python - <<'PY'
          import json
          import os
          from pathlib import Path
          from agent_audit_trust import _atomic_write, append_transition, create_state
          from agent_audit_trust_checkpoint import create_checkpoint

          root = Path(os.environ['RUNNER_TEMP']) / 'audit-trust-consistency'
          def h(value): return f'{value:064x}'
          def snapshot(seed=1):
              return {
                  'valid': True, 'bundle_id': h(1000 + seed), 'bundle_type': 'snapshot',
                  'candidate': {'checkpoint_id': h(2000 + seed), 'catalog_id': h(3000 + seed),
                                'generation': 1, 'segment_count': 1, 'merkle_root': h(4000 + seed)},
                  'previous': None, 'consistency': None, 'proof_count': 1,
                  'segment_count': 0, 'proof_ids': [h(5000 + seed)],
                  'segment_ids': [h(6000 + seed)], 'files': 4, 'bytes': 1000,
              }
          def report(verified, decision):
              candidate = verified['candidate']; previous = verified.get('previous')
              return {
                  'admitted': True, 'policy_sha256': h(7000 + decision),
                  'decision_id': h(8000 + decision),
                  'identity': {
                      'bundle_id': verified['bundle_id'], 'bundle_type': verified['bundle_type'],
                      'candidate_checkpoint_id': candidate['checkpoint_id'],
                      'candidate_catalog_id': candidate['catalog_id'],
                      'previous_checkpoint_id': previous['checkpoint_id'] if previous else None,
                      'previous_catalog_id': previous['catalog_id'] if previous else None,
                  },
                  'evidence': {
                      'files': verified['files'], 'bytes': verified['bytes'],
                      'proof_count': verified['proof_count'],
                      'sealed_segment_count': verified['segment_count'],
                      'selected_segment_indexes': [candidate['segment_count']],
                      'selected_segment_ids': [h(6000 + decision)],
                      'sealed_segment_indexes': [],
                      'candidate_generation': candidate['generation'],
                      'candidate_segment_count': candidate['segment_count'],
                      'generation_delta': candidate['generation'] - previous['generation'] if previous else None,
                  },
                  'violations': [],
              }
          def advance(state, seed):
              head = state['head']
              verified = {
                  'valid': True, 'bundle_id': h(1000 + seed), 'bundle_type': 'transition',
                  'candidate': {'checkpoint_id': h(2000 + seed), 'catalog_id': h(3000 + seed),
                                'generation': head['generation'] + 1,
                                'segment_count': head['segment_count'] + 1,
                                'merkle_root': h(4000 + seed)},
                  'previous': {'checkpoint_id': head['checkpoint_id'], 'catalog_id': head['catalog_id'],
                               'generation': head['generation'], 'segment_count': head['segment_count'],
                               'merkle_root': state['entries'][-1]['evidence']['merkle_root']},
                  'consistency': {'consistency_id': h(9000 + seed),
                                  'relation': 'right-descendant',
                                  'direct_predecessor_verified': True},
                  'proof_count': 1, 'segment_count': 0, 'proof_ids': [h(5000 + seed)],
                  'segment_ids': [h(6000 + seed)], 'files': 7, 'bytes': 2000,
              }
              return append_transition(state, report(verified, seed), verified)

          verified = snapshot()
          anchor = create_state(report(verified, 1), verified)
          candidate = advance(anchor, 2)
          fork = advance(anchor, 3)
          states = {'anchor': anchor, 'candidate': candidate, 'fork': fork}
          pins = {}
          for name, state in states.items():
              _atomic_write(root / f'{name}-state.json', state, require_absent=True)
              checkpoint = create_checkpoint(state)
              (root / f'{name}-checkpoint.json').write_text(
                  json.dumps(checkpoint, sort_keys=True, indent=2) + '\n'
              )
              pins[f'{name}_state_id'] = state['state_id']
              pins[f'{name}_checkpoint_id'] = checkpoint['checkpoint_id']
          (root / 'pins.json').write_text(json.dumps(pins, sort_keys=True))
          PY
          pin() { python -c 'import json,sys; print(json.load(open(sys.argv[1]))[sys.argv[2]])' "$ROOT/pins.json" "$1"; }
          ANCHOR_STATE_ID=$(pin anchor_state_id)
          ANCHOR_CHECKPOINT_ID=$(pin anchor_checkpoint_id)
          CANDIDATE_STATE_ID=$(pin candidate_state_id)
          CANDIDATE_CHECKPOINT_ID=$(pin candidate_checkpoint_id)
          FORK_STATE_ID=$(pin fork_state_id)
          FORK_CHECKPOINT_ID=$(pin fork_checkpoint_id)

          python agent_audit_trust_consistency.py prove \
            "$ROOT/anchor-state.json" "$ROOT/anchor-checkpoint.json" \
            "$ROOT/candidate-state.json" "$ROOT/candidate-checkpoint.json" \
            "$ROOT/consistency.json" \
            --expected-previous-state-id "$ANCHOR_STATE_ID" \
            --expected-previous-checkpoint-id "$ANCHOR_CHECKPOINT_ID" \
            --expected-candidate-state-id "$CANDIDATE_STATE_ID" \
            --expected-candidate-checkpoint-id "$CANDIDATE_CHECKPOINT_ID" \
            --format json > "$ROOT/prove.json"
          rm "$ROOT/anchor-state.json" "$ROOT/candidate-state.json"
          python agent_audit_trust_consistency.py verify \
            "$ROOT/consistency.json" "$ROOT/anchor-checkpoint.json" "$ROOT/candidate-checkpoint.json" \
            --expected-previous-checkpoint-id "$ANCHOR_CHECKPOINT_ID" \
            --expected-candidate-checkpoint-id "$CANDIDATE_CHECKPOINT_ID" \
            --format json > "$ROOT/proof-only.json"

          set +e
          python agent_audit_trust_consistency.py prove \
            "$ROOT/fork-state.json" "$ROOT/fork-checkpoint.json" \
            "$ROOT/anchor-state.json" "$ROOT/anchor-checkpoint.json" \
            "$ROOT/rollback.json" \
            --expected-previous-state-id "$FORK_STATE_ID" \
            --expected-previous-checkpoint-id "$FORK_CHECKPOINT_ID" \
            --expected-candidate-state-id "$ANCHOR_STATE_ID" \
            --expected-candidate-checkpoint-id "$ANCHOR_CHECKPOINT_ID" \
            --format json > "$ROOT/rollback.out" 2> "$ROOT/rollback.err"
          ROLLBACK_STATUS=$?
          python agent_audit_trust_consistency.py prove \
            "$ROOT/fork-state.json" "$ROOT/fork-checkpoint.json" \
            "$ROOT/candidate-state.json" "$ROOT/candidate-checkpoint.json" \
            "$ROOT/fork-proof.json" \
            --expected-previous-state-id "$FORK_STATE_ID" \
            --expected-previous-checkpoint-id "$FORK_CHECKPOINT_ID" \
            --expected-candidate-state-id "$CANDIDATE_STATE_ID" \
            --expected-candidate-checkpoint-id "$CANDIDATE_CHECKPOINT_ID" \
            --format json > "$ROOT/fork.out" 2> "$ROOT/fork.err"
          FORK_STATUS=$?
          set -e
          test "$ROLLBACK_STATUS" -eq 1
          test "$FORK_STATUS" -eq 1
          grep -q 'ATK009' "$ROOT/rollback.err"
          grep -q 'ATK010' "$ROOT/fork.err"
          test ! -e "$ROOT/rollback.json"
          test ! -e "$ROOT/fork-proof.json"
      - name: Preserve portable consistency evidence
        uses: actions/upload-artifact@v4
        with:
          name: audit-trust-consistency-${{ github.sha }}
          path: ${{ runner.temp }}/audit-trust-consistency/
          if-no-files-found: error
