name: audit-catalog-checkpoint
on:
  push:
    branches: [main]
  pull_request:
permissions:
  contents: read
jobs:
  checkpoint-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Test catalog checkpoints and proofs
        run: |
          set +e
          python -m unittest discover -s tests -p "test_audit_catalog_checkpoint.py" -v \
            > "$RUNNER_TEMP/audit-catalog-checkpoint-tests.log" 2>&1
          STATUS=$?
          set -e
          if [ "$STATUS" -ne 0 ]; then
            tail -n 200 "$RUNNER_TEMP/audit-catalog-checkpoint-tests.log"
            exit "$STATUS"
          fi
          cat "$RUNNER_TEMP/audit-catalog-checkpoint-tests.log"
      - name: Re-run catalog, segment, and audit regressions
        run: |
          python -m unittest discover -s tests -p "test_audit_catalog.py" -v
          python -m unittest discover -s tests -p "test_audit_segments.py" -v
          python -m unittest discover -s tests -p "test_agent_audit.py" -v
      - name: Compile checkpoint runtime
        run: python -m compileall -q agent_audit.py agent_audit_events.py agent_audit_segments.py agent_audit_catalog.py agent_audit_checkpoint.py agent_system.py tests/test_audit_catalog_checkpoint.py
      - name: Preserve checkpoint test diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: audit-catalog-checkpoint-tests-${{ matrix.python-version }}-${{ github.sha }}
          path: ${{ runner.temp }}/audit-catalog-checkpoint-tests.log
          if-no-files-found: warn

  checkpoint-integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Create and verify portable segment proof
        run: |
          set -euo pipefail
          ROOT="$RUNNER_TEMP/audit-catalog-checkpoint"
          ARCHIVE="$ROOT/segments"
          ACTIVE="$ROOT/active.jsonl"
          CATALOG="$ARCHIVE/catalog.json"
          CHECKPOINT="$ROOT/checkpoint.json"
          PROOF="$ROOT/proof.json"
          mkdir -p "$ARCHIVE"

          python agent_system.py --audit-log "$ACTIVE" scan . \
            --format json --fail-on high --output "$ROOT/scan.json"
          python agent_audit_segments.py rotate \
            --path "$ACTIVE" --output-dir "$ARCHIVE/segment-one" --format json \
            > "$ROOT/rotate-one.json"
          python agent_system.py --audit-log "$ACTIVE" guard python -m unittest \
            > "$ROOT/guard.json"
          python agent_audit_segments.py rotate \
            --path "$ACTIVE" --output-dir "$ARCHIVE/segment-two" --format json \
            > "$ROOT/rotate-two.json"
          python agent_system.py --audit-log "$ACTIVE" scrub README.md \
            --output "$ROOT/readme.scrubbed" > "$ROOT/scrub.json"
          python agent_audit_segments.py rotate \
            --path "$ACTIVE" --output-dir "$ARCHIVE/segment-three" --format json \
            > "$ROOT/rotate-three.json"

          python agent_audit_catalog.py init "$CATALOG" --active "$ACTIVE" --format json \
            > "$ROOT/catalog-report.json"
          CATALOG_ID=$(python -c 'import json,sys; print(json.load(open(sys.argv[1]))["catalog_id"])' "$ROOT/catalog-report.json")
          python agent_audit_checkpoint.py create "$CATALOG" "$CHECKPOINT" \
            --expected-catalog-id "$CATALOG_ID" --active "$ACTIVE" --format json \
            > "$ROOT/checkpoint-report.json"
          CHECKPOINT_ID=$(python -c 'import json,sys; print(json.load(open(sys.argv[1]))["checkpoint_id"])' "$ROOT/checkpoint-report.json")
          python agent_audit_checkpoint.py verify "$CHECKPOINT" \
            --expected-checkpoint-id "$CHECKPOINT_ID" --catalog "$CATALOG" \
            --expected-catalog-id "$CATALOG_ID" --active "$ACTIVE" --format json \
            > "$ROOT/checkpoint-verify.json"
          python agent_audit_checkpoint.py prove "$CATALOG" "$CHECKPOINT" "$PROOF" \
            --expected-catalog-id "$CATALOG_ID" \
            --expected-checkpoint-id "$CHECKPOINT_ID" \
            --active "$ACTIVE" --segment-index 2 --format json \
            > "$ROOT/proof-report.json"
          python agent_audit_checkpoint.py verify-proof "$PROOF" "$CHECKPOINT" \
            --expected-checkpoint-id "$CHECKPOINT_ID" \
            --segment-dir "$ARCHIVE/segment-two" --format json \
            > "$ROOT/proof-verify-full.json"

          rm "$CATALOG"
          rm -rf "$ARCHIVE/segment-one" "$ARCHIVE/segment-three"
          python agent_audit_checkpoint.py verify-proof "$PROOF" "$CHECKPOINT" \
            --expected-checkpoint-id "$CHECKPOINT_ID" \
            --segment-dir "$ARCHIVE/segment-two" --format json \
            > "$ROOT/proof-verify-portable.json"

          set +e
          python agent_audit_checkpoint.py verify "$CHECKPOINT" \
            --expected-checkpoint-id "ffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffff" \
            --format json > "$ROOT/stale-pin.json" 2> "$ROOT/stale-pin.err"
          STALE_STATUS=$?
          set -e
          test "$STALE_STATUS" -eq 1

          python - <<'PY'
          import json
          import os
          from pathlib import Path
          from agent_audit_checkpoint import _canonical_bytes, _identifier

          root = Path(os.environ['RUNNER_TEMP']) / 'audit-catalog-checkpoint'
          proof = json.loads((root / 'proof.json').read_text())
          proof['audit_path'][0] = 'f' * 64
          core = dict(proof)
          core.pop('proof_id')
          proof['proof_id'] = _identifier(b'audit-catalog-inclusion-proof-v1', core)
          (root / 'tampered-proof.json').write_bytes(_canonical_bytes(proof))
          PY
          set +e
          python agent_audit_checkpoint.py verify-proof "$ROOT/tampered-proof.json" "$CHECKPOINT" \
            --expected-checkpoint-id "$CHECKPOINT_ID" --format json \
            > "$ROOT/tampered-proof-report.json" 2> "$ROOT/tampered-proof.err"
          TAMPER_STATUS=$?
          set -e
          test "$TAMPER_STATUS" -eq 2

          python - <<'PY'
          import json
          import os
          from pathlib import Path

          root = Path(os.environ['RUNNER_TEMP']) / 'audit-catalog-checkpoint'
          checkpoint = json.loads((root / 'checkpoint-verify.json').read_text())
          full = json.loads((root / 'proof-verify-full.json').read_text())
          portable = json.loads((root / 'proof-verify-portable.json').read_text())
          assert checkpoint['valid'] is True
          assert checkpoint['segment_count'] == 3
          assert full['valid'] is portable['valid'] is True
          assert full['segment_verified'] is portable['segment_verified'] is True
          assert full['entry']['segment_index'] == 2
          assert full['proof_id'] == portable['proof_id']
          assert not (root / 'segments' / 'catalog.json').exists()
          PY
      - name: Preserve verified checkpoint and proof evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: basit-agent-system-audit-catalog-checkpoint-${{ github.sha }}
          path: ${{ runner.temp }}/audit-catalog-checkpoint/
          if-no-files-found: error

  checkpoint-package-smoke:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Build and validate dependency-free wheel
        run: |
          python -m pip wheel . --no-deps --wheel-dir dist
          python scripts/validate_wheel.py dist/*.whl
      - name: Install and exercise checkpoint aliases outside source checkout
        run: |
          set -euo pipefail
          python -m venv "$RUNNER_TEMP/checkpoint-venv"
          BIN="$RUNNER_TEMP/checkpoint-venv/bin"
          "$BIN/python" -m pip install --no-deps dist/*.whl
          ROOT="$RUNNER_TEMP/installed-checkpoint"
          ARCHIVE="$ROOT/segments"
          ACTIVE="$ROOT/active.jsonl"
          CATALOG="$ARCHIVE/catalog.json"
          CHECKPOINT="$ROOT/checkpoint.json"
          PROOF="$ROOT/proof.json"
          mkdir -p "$ARCHIVE" "$ROOT/run"
          cd "$ROOT/run"

          "$BIN/basit-agent" --audit-log "$ACTIVE" scan "$GITHUB_WORKSPACE" \
            --format json --fail-on high --output "$ROOT/scan.json"
          "$BIN/basit-agent-segments" rotate --path "$ACTIVE" \
            --output-dir "$ARCHIVE/segment-one" --format json > "$ROOT/rotate.json"
          "$BIN/basit-agent-catalog" init "$CATALOG" --active "$ACTIVE" \
            --format json > "$ROOT/catalog-report.json"
          CATALOG_ID=$("$BIN/python" -c 'import json,sys; print(json.load(open(sys.argv[1]))["catalog_id"])' "$ROOT/catalog-report.json")
          "$BIN/basit-agent-catalog-checkpoint" create "$CATALOG" "$CHECKPOINT" \
            --expected-catalog-id "$CATALOG_ID" --active "$ACTIVE" --format json \
            > "$ROOT/checkpoint-report.json"
          CHECKPOINT_ID=$("$BIN/python" -c 'import json,sys; print(json.load(open(sys.argv[1]))["checkpoint_id"])' "$ROOT/checkpoint-report.json")
          "$BIN/basit-agent-catalog-checkpoint" prove "$CATALOG" "$CHECKPOINT" "$PROOF" \
            --expected-catalog-id "$CATALOG_ID" \
            --expected-checkpoint-id "$CHECKPOINT_ID" --active "$ACTIVE" \
            --segment-index 1 --format json > "$ROOT/proof-report.json"
          "$BIN/agent-audit-catalog-checkpoint" verify-proof "$PROOF" "$CHECKPOINT" \
            --expected-checkpoint-id "$CHECKPOINT_ID" \
            --segment-dir "$ARCHIVE/segment-one" --format json > "$ROOT/verify.json"

          "$BIN/python" - <<'PY'
          import json
          import os
          from pathlib import Path

          root = Path(os.environ['RUNNER_TEMP']) / 'installed-checkpoint'
          report = json.loads((root / 'verify.json').read_text())
          assert report['valid'] is True
          assert report['segment_verified'] is True
          assert report['entry']['segment_index'] == 1
          PY
