name: audit-trust-bundle-package
on:
  push:
    branches: [main]
  pull_request:
permissions:
  contents: read
jobs:
  trust-bundle-package-smoke:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Build and validate dependency-free wheel
        run: |
          python -m pip wheel . --no-deps --wheel-dir dist
          python scripts/validate_wheel.py dist/*.whl
      - name: Install and exercise both trust bundle aliases outside source checkout
        run: |
          set -euo pipefail
          python -m venv "$RUNNER_TEMP/trust-bundle-venv"
          BIN="$RUNNER_TEMP/trust-bundle-venv/bin"
          "$BIN/python" -m pip install --no-deps dist/*.whl
          ROOT="$RUNNER_TEMP/installed-audit-trust-bundle"
          mkdir -p "$ROOT/run"
          cd "$ROOT/run"
          ROOT="$ROOT" "$BIN/python" - <<'PY'
          import json
          import os
          from pathlib import Path
          from agent_audit_trust import append_transition, create_state, canonical_json
          from agent_audit_trust_checkpoint import create_checkpoint, create_proof
          from agent_audit_trust_consistency import create_consistency_proof

          root = Path(os.environ["ROOT"])
          def h(value): return f"{value:064x}"
          def report(verified, decision):
              candidate = verified["candidate"]
              previous = verified.get("previous")
              return {
                  "admitted": True,
                  "policy_sha256": h(7000 + decision),
                  "decision_id": h(8000 + decision),
                  "identity": {
                      "bundle_id": verified["bundle_id"],
                      "bundle_type": verified["bundle_type"],
                      "candidate_checkpoint_id": candidate["checkpoint_id"],
                      "candidate_catalog_id": candidate["catalog_id"],
                      "previous_checkpoint_id": previous["checkpoint_id"] if previous else None,
                      "previous_catalog_id": previous["catalog_id"] if previous else None,
                  },
                  "evidence": {
                      "files": verified["files"], "bytes": verified["bytes"],
                      "proof_count": verified["proof_count"],
                      "sealed_segment_count": verified["segment_count"],
                      "selected_segment_indexes": [candidate["segment_count"]],
                      "selected_segment_ids": [h(6000 + decision)],
                      "sealed_segment_indexes": [],
                      "candidate_generation": candidate["generation"],
                      "candidate_segment_count": candidate["segment_count"],
                      "generation_delta": candidate["generation"] - previous["generation"] if previous else None,
                  },
                  "violations": [],
              }
          snapshot = {
              "valid": True, "bundle_id": h(1001), "bundle_type": "snapshot",
              "candidate": {"checkpoint_id": h(2001), "catalog_id": h(3001),
                            "generation": 1, "segment_count": 1, "merkle_root": h(4001)},
              "previous": None, "consistency": None, "proof_count": 1,
              "segment_count": 0, "proof_ids": [h(5001)], "segment_ids": [h(6001)],
              "files": 4, "bytes": 1000,
          }
          previous = create_state(report(snapshot, 1), snapshot)
          head = previous["head"]
          transition = {
              "valid": True, "bundle_id": h(1002), "bundle_type": "transition",
              "candidate": {"checkpoint_id": h(2002), "catalog_id": h(3002),
                            "generation": 2, "segment_count": 2, "merkle_root": h(4002)},
              "previous": {"checkpoint_id": head["checkpoint_id"], "catalog_id": head["catalog_id"],
                           "generation": head["generation"], "segment_count": head["segment_count"],
                           "merkle_root": previous["entries"][-1]["evidence"]["merkle_root"]},
              "consistency": {"consistency_id": h(9002), "relation": "right-descendant",
                              "direct_predecessor_verified": True},
              "proof_count": 1, "segment_count": 0, "proof_ids": [h(5002)],
              "segment_ids": [h(6002)], "files": 7, "bytes": 2000,
          }
          candidate = append_transition(previous, report(transition, 2), transition)
          previous_cp = create_checkpoint(previous)
          candidate_cp = create_checkpoint(candidate)
          consistency = create_consistency_proof(previous, previous_cp, candidate, candidate_cp)
          proof = create_proof(candidate, candidate_cp, sequence=candidate_cp["entry_count"])
          for name, payload in {
              "previous.json": previous_cp, "candidate.json": candidate_cp,
              "consistency.json": consistency, "proof.json": proof,
          }.items():
              (root / name).write_bytes(canonical_json(payload))
          (root / "pins.json").write_text(json.dumps({
              "previous": previous_cp["checkpoint_id"],
              "candidate": candidate_cp["checkpoint_id"],
          }, sort_keys=True))
          PY
          pin() { "$BIN/python" -c 'import json,sys; print(json.load(open(sys.argv[1]))[sys.argv[2]])' "$ROOT/pins.json" "$1"; }
          PREVIOUS=$(pin previous)
          CANDIDATE=$(pin candidate)
          "$BIN/basit-agent-audit-trust-bundle" create "$ROOT/handoff" \
            --candidate-checkpoint "$ROOT/candidate.json" \
            --expected-candidate-checkpoint-id "$CANDIDATE" \
            --proof "$ROOT/proof.json" \
            --previous-checkpoint "$ROOT/previous.json" \
            --expected-previous-checkpoint-id "$PREVIOUS" \
            --consistency-proof "$ROOT/consistency.json" \
            --format json > "$ROOT/create.json"
          BUNDLE=$("$BIN/python" -c 'import json,sys; print(json.load(open(sys.argv[1]))["bundle_id"])' "$ROOT/create.json")
          rm "$ROOT/previous.json" "$ROOT/candidate.json" "$ROOT/consistency.json" "$ROOT/proof.json"
          "$BIN/agent-audit-trust-bundle" verify "$ROOT/handoff" \
            --expected-bundle-id "$BUNDLE" \
            --expected-candidate-checkpoint-id "$CANDIDATE" \
            --expected-previous-checkpoint-id "$PREVIOUS" \
            --format json > "$ROOT/verify.json"
          "$BIN/python" -c 'import json,sys; d=json.load(open(sys.argv[1])); assert d["valid"] and d["bundle_type"]=="transition"' "$ROOT/verify.json"
