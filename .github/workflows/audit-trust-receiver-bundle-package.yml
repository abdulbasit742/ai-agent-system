name: audit-trust-receiver-bundle-package
on:
  push:
    branches: [main]
  pull_request:
permissions:
  contents: read
jobs:
  receiver-bundle-package-smoke:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Build and validate dependency-free wheel
        run: |
          python -m pip wheel . --no-deps --wheel-dir dist
          python scripts/validate_wheel.py dist/*.whl
      - name: Install and exercise both receiver bundle aliases outside source checkout
        run: |
          set -euo pipefail
          python -m venv "$RUNNER_TEMP/receiver-bundle-venv"
          BIN="$RUNNER_TEMP/receiver-bundle-venv/bin"
          "$BIN/python" -m pip install --no-deps dist/*.whl
          ROOT="$RUNNER_TEMP/installed-audit-trust-receiver-bundle"
          mkdir -p "$ROOT/run"
          cd "$ROOT/run"
          ROOT="$ROOT" "$BIN/python" - <<'PY'
          import json
          import os
          from pathlib import Path
          from agent_audit_trust_receiver import append_transition, canonical_json, create_state
          from agent_audit_trust_receiver_checkpoint import create_checkpoint, create_proof
          from agent_audit_trust_receiver_consistency import create_consistency_proof

          root = Path(os.environ["ROOT"])
          def h(value): return f"{value:064x}"
          def snapshot(seed=1):
              return {
                  "valid": True, "bundle_id": h(1000 + seed), "bundle_type": "snapshot",
                  "candidate": {
                      "checkpoint_id": h(2000 + seed), "state_id": h(3000 + seed),
                      "entry_count": seed, "merkle_root": h(4000 + seed),
                      "head": {
                          "entry_hash": h(5000 + seed), "bundle_id": h(6000 + seed),
                          "checkpoint_id": h(7000 + seed), "catalog_id": h(8000 + seed),
                          "generation": seed, "segment_count": seed,
                      },
                  },
                  "previous": None, "consistency": None, "proof_count": 1,
                  "files": 4, "bytes": 1000, "head_bundle_id": h(6000 + seed),
              }
          def transition(state, seed):
              head = state["head"]
              return {
                  "valid": True, "bundle_id": h(1000 + seed), "bundle_type": "transition",
                  "candidate": {
                      "checkpoint_id": h(2000 + seed), "state_id": h(3000 + seed),
                      "entry_count": head["entry_count"] + 2, "merkle_root": h(4000 + seed),
                      "head": {
                          "entry_hash": h(5000 + seed), "bundle_id": h(6000 + seed),
                          "checkpoint_id": h(7000 + seed), "catalog_id": h(8000 + seed),
                          "generation": head["generation"] + 1,
                          "segment_count": head["segment_count"] + 1,
                      },
                  },
                  "previous": {
                      "checkpoint_id": head["checkpoint_id"], "state_id": head["state_id"],
                      "entry_count": head["entry_count"],
                  },
                  "consistency": {
                      "consistency_id": h(9000 + seed), "relation": "right-descendant",
                      "direct_predecessor_verified": True,
                  },
                  "proof_count": 1, "files": 7, "bytes": 2000,
                  "head_bundle_id": h(6000 + seed),
              }
          def admission(verified, seed):
              candidate = verified["candidate"]
              previous = verified.get("previous")
              head = candidate["head"]
              return {
                  "admitted": True, "policy_sha256": h(10000 + seed),
                  "decision_id": h(11000 + seed),
                  "identity": {
                      "bundle_id": verified["bundle_id"], "bundle_type": verified["bundle_type"],
                      "candidate_checkpoint_id": candidate["checkpoint_id"],
                      "candidate_state_id": candidate["state_id"],
                      "previous_checkpoint_id": previous["checkpoint_id"] if previous else None,
                      "previous_state_id": previous["state_id"] if previous else None,
                  },
                  "evidence": {
                      "candidate_entry_count": candidate["entry_count"],
                      "candidate_generation": head["generation"],
                      "candidate_segment_count": head["segment_count"],
                      "head_bundle_id": verified["head_bundle_id"],
                      "entry_delta": candidate["entry_count"] - previous["entry_count"] if previous else None,
                      "generation_delta": 1 if previous else None,
                  },
                  "violations": [],
              }
          verified1 = snapshot(1)
          state1 = create_state(admission(verified1, 1), verified1)
          verified2 = transition(state1, 102)
          state2 = append_transition(state1, admission(verified2, 102), verified2)
          previous_cp = create_checkpoint(state1)
          candidate_cp = create_checkpoint(state2)
          head_proof = create_proof(state2, candidate_cp, sequence=2)
          consistency = create_consistency_proof(state1, previous_cp, state2, candidate_cp)
          for name, value in {
              "previous.json": previous_cp,
              "candidate.json": candidate_cp,
              "head-proof.json": head_proof,
              "consistency.json": consistency,
          }.items():
              (root / name).write_bytes(canonical_json(value))
          (root / "pins.json").write_text(json.dumps({
              "previous": previous_cp["checkpoint_id"],
              "candidate": candidate_cp["checkpoint_id"],
          }, sort_keys=True))
          PY
          pin() { "$BIN/python" -c 'import json,sys; print(json.load(open(sys.argv[1]))[sys.argv[2]])' "$ROOT/pins.json" "$1"; }
          PREVIOUS=$(pin previous)
          CANDIDATE=$(pin candidate)
          "$BIN/basit-agent-audit-trust-receiver-bundle" create "$ROOT/handoff" \
            --candidate-checkpoint "$ROOT/candidate.json" \
            --expected-candidate-checkpoint-id "$CANDIDATE" \
            --proof "$ROOT/head-proof.json" \
            --previous-checkpoint "$ROOT/previous.json" \
            --expected-previous-checkpoint-id "$PREVIOUS" \
            --consistency-proof "$ROOT/consistency.json" \
            --format json > "$ROOT/create.json"
          BUNDLE=$("$BIN/python" -c 'import json,sys; print(json.load(open(sys.argv[1]))["bundle_id"])' "$ROOT/create.json")
          rm "$ROOT/previous.json" "$ROOT/candidate.json" "$ROOT/head-proof.json" "$ROOT/consistency.json"
          "$BIN/agent-audit-trust-receiver-bundle" verify "$ROOT/handoff" \
            --expected-bundle-id "$BUNDLE" \
            --expected-candidate-checkpoint-id "$CANDIDATE" \
            --expected-previous-checkpoint-id "$PREVIOUS" \
            --format json > "$ROOT/verify.json"
          "$BIN/python" -c 'import json,sys; d=json.load(open(sys.argv[1])); assert d["valid"] and d["bundle_type"]=="transition" and d["proof_count"]==1' "$ROOT/verify.json"
      - name: Preserve installed receiver bundle evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: audit-trust-receiver-bundle-package-${{ matrix.python-version }}-${{ github.sha }}
          path: ${{ runner.temp }}/installed-audit-trust-receiver-bundle/
          if-no-files-found: warn
