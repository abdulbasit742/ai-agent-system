name: audit-trust-bundle
on:
  push:
    branches: [main]
  pull_request:
permissions:
  contents: read
jobs:
  trust-bundle-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Test portable audit trust bundles
        run: |
          set +e
          python -m unittest discover -s tests -p "test_audit_trust_bundle.py" -v \
            > "$RUNNER_TEMP/audit-trust-bundle-tests.log" 2>&1
          STATUS=$?
          set -e
          if [ "$STATUS" -ne 0 ]; then
            cat "$RUNNER_TEMP/audit-trust-bundle-tests.log"
            exit "$STATUS"
          fi
          cat "$RUNNER_TEMP/audit-trust-bundle-tests.log"
      - name: Re-run trust checkpoint and consistency regressions
        run: |
          python -m unittest discover -s tests -p "test_audit_trust_checkpoint.py" -v
          python -m unittest discover -s tests -p "test_audit_trust_consistency.py" -v
      - name: Compile runtime
        run: python -m compileall -q agent_audit_trust_bundle.py agent_audit_trust_bundle_core.py tests/test_audit_trust_bundle.py
      - name: Preserve test diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: audit-trust-bundle-tests-${{ matrix.python-version }}-${{ github.sha }}
          path: ${{ runner.temp }}/audit-trust-bundle-tests.log
          if-no-files-found: warn

  trust-bundle-integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Create and verify offline transition handoff
        run: |
          set -euo pipefail
          ROOT="$RUNNER_TEMP/audit-trust-bundle"
          mkdir -p "$ROOT"
          exec > >(tee "$ROOT/integration.log") 2>&1
          ROOT="$ROOT" python - <<'PY'
          import json
          import os
          import sys
          from pathlib import Path
          sys.path.insert(0, "tests")
          from test_audit_trust_consistency import anchor, advance
          from agent_audit_bundle import _canonical_bytes
          from agent_audit_trust_checkpoint import create_checkpoint, create_proof
          from agent_audit_trust_consistency import create_consistency_proof

          root = Path(os.environ["ROOT"])
          previous = anchor()
          candidate = advance(previous)
          previous_cp = create_checkpoint(previous)
          candidate_cp = create_checkpoint(candidate)
          consistency = create_consistency_proof(previous, previous_cp, candidate, candidate_cp)
          head_proof = create_proof(candidate, candidate_cp, sequence=candidate_cp["entry_count"])
          for name, payload in {
              "previous.json": previous_cp,
              "candidate.json": candidate_cp,
              "consistency.json": consistency,
              "head-proof.json": head_proof,
          }.items():
              (root / name).write_bytes(_canonical_bytes(payload))
          (root / "pins.json").write_text(json.dumps({
              "previous": previous_cp["checkpoint_id"],
              "candidate": candidate_cp["checkpoint_id"],
          }, sort_keys=True))
          PY
          pin() { python -c 'import json,sys; print(json.load(open(sys.argv[1]))[sys.argv[2]])' "$ROOT/pins.json" "$1"; }
          PREVIOUS=$(pin previous)
          CANDIDATE=$(pin candidate)
          python agent_audit_trust_bundle.py create "$ROOT/handoff" \
            --candidate-checkpoint "$ROOT/candidate.json" \
            --expected-candidate-checkpoint-id "$CANDIDATE" \
            --proof "$ROOT/head-proof.json" \
            --previous-checkpoint "$ROOT/previous.json" \
            --expected-previous-checkpoint-id "$PREVIOUS" \
            --consistency-proof "$ROOT/consistency.json" \
            --format json > "$ROOT/create.json"
          BUNDLE=$(python -c 'import json,sys; print(json.load(open(sys.argv[1]))["bundle_id"])' "$ROOT/create.json")
          rm "$ROOT/previous.json" "$ROOT/candidate.json" "$ROOT/consistency.json" "$ROOT/head-proof.json"
          python agent_audit_trust_bundle.py verify "$ROOT/handoff" \
            --expected-bundle-id "$BUNDLE" \
            --expected-candidate-checkpoint-id "$CANDIDATE" \
            --expected-previous-checkpoint-id "$PREVIOUS" \
            --format json > "$ROOT/verify.json"
          python -c 'import json,sys; d=json.load(open(sys.argv[1])); assert d["valid"] and d["bundle_type"]=="transition"' "$ROOT/verify.json"
      - name: Preserve trust handoff evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: audit-trust-bundle-${{ github.sha }}
          path: ${{ runner.temp }}/audit-trust-bundle/
          if-no-files-found: warn
